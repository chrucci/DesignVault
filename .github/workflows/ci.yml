# =============================================================================
# CI Pipeline — Lint, typecheck, build, and e2e tests
# Runs on every pull request targeting the main branch
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint and typecheck across the entire monorepo
  # ---------------------------------------------------------------------------
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint and typecheck
        run: pnpm turbo lint typecheck

  # ---------------------------------------------------------------------------
  # Job 2: Build the Next.js web application
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web application
        run: pnpm --filter @design-vault/web build

  # ---------------------------------------------------------------------------
  # Job 3: End-to-end tests with Playwright
  # Depends on build to ensure the app compiles before running expensive tests
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: E2E Tests
    runs-on: self-hosted
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @design-vault/e2e exec playwright install --with-deps

      - name: Build web application
        run: pnpm --filter @design-vault/web build

      - name: Run Playwright tests
        run: pnpm --filter @design-vault/e2e test
        env:
          # Playwright will start the dev server via webServer config in playwright.config.ts
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
